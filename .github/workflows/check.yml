name: Code Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Auto-fix formatting
        run: npx prettier --write "**/*.ts" "**/*.tsx" "**/*.js" "**/*.json" --ignore-unknown || true

      - name: Auto-fix lint issues
        run: npx eslint . --ext .ts,.tsx --fix || true

      - name: Commit fixes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "chore: auto-fix formatting and lint")

      - name: Push fixes
        run: git push || true

      - name: TypeScript type check
        id: tsc
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint check
        id: lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

      - name: Build check
        id: build
        run: npm run build
        continue-on-error: true

      - name: Evaluate initial results
        id: issues
        run: |
          if [ "${{ steps.tsc.outcome }}" == "failure" ] || [ "${{ steps.lint.outcome }}" == "failure" ] || [ "${{ steps.build.outcome }}" == "failure" ]; then
            echo "HAS_ERRORS=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_ERRORS=false" >> $GITHUB_OUTPUT
          fi

      - name: Retry (attempt 2)
        id: retry2
        if: steps.issues.outputs.HAS_ERRORS == 'true'
        run: |
          npx prettier --write "**/*.ts" "**/*.tsx" "**/*.js" "**/*.json" --ignore-unknown || true
          npx eslint . --ext .ts,.tsx --fix || true
          git diff --quiet || (git add -A && git commit -m "chore: auto-fix (retry 2)" && git push) || true
          npx tsc --noEmit 2>/dev/null && npm run build 2>/dev/null && npx eslint . --ext .ts,.tsx --max-warnings 0 2>/dev/null && echo "STILL_ERRORS=false" >> $GITHUB_OUTPUT || echo "STILL_ERRORS=true" >> $GITHUB_OUTPUT

      - name: Retry (attempt 3)
        id: retry3
        if: steps.retry2.outputs.STILL_ERRORS == 'true'
        run: |
          npx prettier --write "**/*.ts" "**/*.tsx" "**/*.js" "**/*.json" --ignore-unknown || true
          npx eslint . --ext .ts,.tsx --fix || true
          git diff --quiet || (git add -A && git commit -m "chore: auto-fix (retry 3)" && git push) || true
          npx tsc --noEmit 2>/dev/null && npm run build 2>/dev/null && npx eslint . --ext .ts,.tsx --max-warnings 0 2>/dev/null && echo "STILL_ERRORS=false" >> $GITHUB_OUTPUT || echo "STILL_ERRORS=true" >> $GITHUB_OUTPUT

      - name: Retry (attempt 4)
        id: retry4
        if: steps.retry3.outputs.STILL_ERRORS == 'true'
        run: |
          npx prettier --write "**/*.ts" "**/*.tsx" "**/*.js" "**/*.json" --ignore-unknown || true
          npx eslint . --ext .ts,.tsx --fix || true
          git diff --quiet || (git add -A && git commit -m "chore: auto-fix (retry 4)" && git push) || true
          npx tsc --noEmit 2>/dev/null && npm run build 2>/dev/null && npx eslint . --ext .ts,.tsx --max-warnings 0 2>/dev/null && echo "STILL_ERRORS=false" >> $GITHUB_OUTPUT || echo "STILL_ERRORS=true" >> $GITHUB_OUTPUT

      - name: Retry (attempt 5)
        id: retry5
        if: steps.retry4.outputs.STILL_ERRORS == 'true'
        run: |
          npx prettier --write "**/*.ts" "**/*.tsx" "**/*.js" "**/*.json" --ignore-unknown || true
          npx eslint . --ext .ts,.tsx --fix || true
          git diff --quiet || (git add -A && git commit -m "chore: auto-fix (retry 5)" && git push) || true
          npx tsc --noEmit 2>/dev/null && npm run build 2>/dev/null && npx eslint . --ext .ts,.tsx --max-warnings 0 2>/dev/null && echo "STILL_ERRORS=false" >> $GITHUB_OUTPUT || echo "STILL_ERRORS=true" >> $GITHUB_OUTPUT

      - name: Open GitHub Issue if still broken
        if: steps.retry5.outputs.STILL_ERRORS == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Code Check Failed] ${context.sha.substring(0,7)} — needs attention`,
              body: `## Code check failed after 5 auto-fix attempts\n\n**Repo:** ${context.repo.repo}\n**Commit:** ${context.sha}\n**Branch:** ${context.ref}\n**Run:** ${context.runId}\n\nAuto-fix (Prettier + ESLint) was attempted 5 times but errors remain. Hermes: please diagnose, fix, push, and close this issue. If you cannot fix it, escalate to Cat.\n\n[View workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
